#############################################################################
# UMU Game Installer Configuration
#############################################################################
# This file contains advanced configuration options for the installer.
# Copy to ~/.config/umu-game-installer/config to use.
#############################################################################

# Installation Directories
#############################################################################

# Default root directory for game installations
INSTALL_ROOT="$HOME/Games"

# Alternative: Install to SD card
# INSTALL_ROOT="/run/media/mmcblk0p1/Games"

# Dependency storage location
DEPS_DIR="$CONFIG_DIR/dependencies"

# Configuration directory
# CONFIG_DIR="${XDG_CONFIG_HOME:-$HOME/.config}/umu-game-installer"


# Dependency Management
#############################################################################

# Automatically detect and install dependencies
AUTO_INSTALL_DEPS=true

# Prompt before installing each dependency
PROMPT_DEPS=true

# Share dependencies between games
SHARE_DEPS=true

# Clean unused dependencies automatically
AUTO_CLEAN_DEPS=false


# Installer Behavior
#############################################################################

# Automatically detect game executable after installation
AUTO_DETECT_EXE=true

# Maximum depth to search for executables
SEARCH_DEPTH=3

# Executable detection patterns (space-separated)
# These patterns are EXCLUDED from detection
EXCLUDE_EXE_PATTERNS="unins uninst install setup redist crash report config"

# Automatically add game to Steam
AUTO_ADD_STEAM=true

# Automatically create desktop shortcut
AUTO_DESKTOP_SHORTCUT=true


# Wine/Proton Configuration
#############################################################################

# Default GAMEID prefix for umu-run
GAMEID_PREFIX="umu"

# Additional Wine environment variables (space-separated)
# Example: "DXVK_HUD=1 WINE_FULLSCREEN_FSR=1"
WINE_ENV_VARS=""

# Enable DXVK (DirectX to Vulkan)
ENABLE_DXVK=true

# Enable VKD3D (DirectX 12 to Vulkan)
ENABLE_VKD3D=true

# Enable Fsync (fast synchronization)
ENABLE_FSYNC=true

# Enable Esync (eventfd-based synchronization)
ENABLE_ESYNC=true

# Wine DLL overrides (comma-separated)
# Example: "d3d11=n,b xinput1_3=n,b"
WINE_DLL_OVERRIDES=""


# Steam Integration
#############################################################################

# Steam shortcuts directory
STEAM_SHORTCUTS="$HOME/.local/share/applications"

# Steam user data directory (for shortcuts.vdf)
STEAM_USERDATA="$HOME/.local/share/Steam/userdata"

# Add to Steam library (creates .desktop file)
STEAM_ADD_LIBRARY=true

# Add to Steam grid (future feature)
STEAM_ADD_GRID=false


# Desktop Integration
#############################################################################

# Desktop directory
DESKTOP_DIR="${XDG_DESKTOP_DIR:-$HOME/Desktop}"

# Desktop icon (fallback if game icon not extracted)
DEFAULT_ICON="application-x-executable"

# Make desktop shortcuts executable
DESKTOP_EXEC=true


# Logging
#############################################################################

# Enable verbose logging
VERBOSE=false

# Log file location
LOG_FILE="$CONFIG_DIR/installer.log"

# Keep logs for N days
LOG_RETENTION_DAYS=30


# Advanced Options
#############################################################################

# Enable experimental features
EXPERIMENTAL=false

# Use custom umu-run binary
# CUSTOM_UMU_RUN="/usr/local/bin/umu-run"

# Timeout for installer execution (seconds, 0=unlimited)
INSTALLER_TIMEOUT=0

# Parallel dependency installation
PARALLEL_DEPS=false

# Maximum parallel installations
MAX_PARALLEL=2


# Game-Specific Overrides
#############################################################################
# Format: OVERRIDE_<GAME_ID>_<SETTING>=value
#
# Example:
# OVERRIDE_witcher3_WINE_DLL_OVERRIDES="d3d11=n"
# OVERRIDE_witcher3_WINE_ENV_VARS="DXVK_HUD=1"
# OVERRIDE_skyrim_AUTO_DETECT_EXE=false
# OVERRIDE_skyrim_MANUAL_EXE="drive_c/Games/Skyrim/TESV.exe"


# Known Dependency URLs
#############################################################################
# These URLs are used for automatic dependency download (future feature)

# Visual C++ Redistributables
VCREDIST_2022_URL="https://aka.ms/vs/17/release/vc_redist.x64.exe"
VCREDIST_2019_URL="https://aka.ms/vs/16/release/vc_redist.x64.exe"
VCREDIST_2017_URL="https://aka.ms/vs/15/release/vc_redist.x64.exe"
VCREDIST_2015_URL="https://download.microsoft.com/download/9/3/F/93FCF1E7-E6A4-478B-96E7-D4B285925B00/vc_redist.x64.exe"

# .NET Framework
DOTNET_48_URL="https://dotnet.microsoft.com/download/dotnet-framework/thank-you/net48-web-installer"
DOTNET_35_URL="https://dotnet.microsoft.com/download/dotnet-framework/thank-you/net35-sp1-web-installer"

# DirectX
DIRECTX_URL="https://download.microsoft.com/download/1/7/1/1718CCC4-6315-4D8E-9543-8E28A4E18C4C/dxwebsetup.exe"


#############################################################################
# End of Configuration
#############################################################################
